name: Request Removal
description: Request that an app or resource be removed from the directory
title: "Remove: "
labels: ["remove-app"]
body:
  - type: input
    id: name
    attributes:
      label: App name
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for removal
      placeholder: The app is no longer maintained / the URL is broken / it is not Bahai-related…
    validations:
      required: true
